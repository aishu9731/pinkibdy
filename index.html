<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Pinki</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
height:100vh;

background:linear-gradient(45deg,#ff0080,#ff4da6,#7a00ff,#00c3ff);
background-size:400% 400%;
animation:bg 8s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

h1{
margin-top:30px;
font-size:45px;
}

.gallery{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.gallery img{
width:260px;
height:320px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px black;
}

.question{
margin-top:30px;
font-size:28px;
}

button{
padding:12px 25px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
}

#yes{
background:#00ff9d;
}

#no{
background:#ff3b5c;
position:absolute;
}

</style>

</head>

<body>

<h1>🎂 Happy Birthday Pinki 🎉</h1>

<div class="gallery">
<img src="images/p1.jpeg">
<img src="images/p2.jpeg">
<img src="images/p3.jpeg">
</div>

<div class="question">
❤️ Pinki would you live forever with me?
</div>

<button id="yes" onclick="goYes()">YES ❤️</button>
<button id="no" onmouseover="moveNo()">NO 💔</button>

<script>

function goYes(){
window.location.href="yes.html";
}

function moveNo(){

let btn=document.getElementById("no");

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

btn.style.left=x+"px";
btn.style.top=y+"px";

}

</script>

</body>
</html>
